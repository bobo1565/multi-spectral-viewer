services:
  backend:
    build: ./backend
    container_name: multispectral-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - ENV=production
      - SAM2_SERVICE_URL=http://sam2:8001
    depends_on:
      - sam2
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: multispectral-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  sam2:
    build: ./sam2_service
    container_name: multispectral-sam2
    ports:
      - "8001:8001"
    volumes:
      - sam2_cache:/root/.config/Ultralytics
    environment:
      - SAM2_MODEL=sam2.1_l.pt
    restart: unless-stopped

volumes:
  uploads:
  sam2_cache:
