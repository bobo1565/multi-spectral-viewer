services:
  backend:
    build: ./backend
    container_name: multispectral-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - ENV=production
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: multispectral-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
