services:
  backend:
    build: ./backend
    container_name: multispectral-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      # 可选：挂载旧版 cameras_db.json 供首次启动迁移到 SQLite（迁移后会重命名为 .migrated）
      # - ./cameras_db.json:/app/cameras_db.json:ro
    environment:
      - ENV=production
      - SAM2_SERVICE_URL=http://sam2:8001
    depends_on:
      - sam2
    restart: unless-stopped
    # Linux 上若需 ONVIF 多播发现，可改用 host 网络（此时需自行用宿主机 IP 访问 SAM2，并去掉 depends_on 的端口映射语义）
    # network_mode: host

  frontend:
    build: ./frontend
    container_name: multispectral-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  sam2:
    build: ./sam2_service
    container_name: multispectral-sam2
    ports:
      - "8001:8001"
    volumes:
      - sam2_cache:/root/.config/Ultralytics
    environment:
      - SAM2_MODEL=sam2.1_l.pt
    restart: unless-stopped

volumes:
  uploads:
  sam2_cache:
